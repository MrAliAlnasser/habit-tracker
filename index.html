    <style>
        :root {
            --bg: #F6F1E6;
            --surface: #FFFFFF;
            --surface-2: #FBF8F1;
            --ink: #23282B;
            --muted: #7A7166;
            --primary: #0F6E5F;
            --primary-ink: #0B5347;
            --accent: #D97B3F;
            --border: #E7DFCD;
            --danger: #C0453A;
            --ring-bg: #E9E1CC;
            --radius: 18px;
            --radius-sm: 10px;
            --shadow: 0 10px 30px -14px rgba(35, 40, 43, 0.18);
            --font-display: 'Cairo', sans-serif;
            --font-body: 'Tajawal', sans-serif;
        }

        [data-theme="dark"] {
            --bg: #17191C;
            --surface: #202327;
            --surface-2: #26292E;
            --ink: #E8E9EB;
            --muted: #9297A0;
            --primary: #6FA8DC;
            --primary-ink: #8FBEE6;
            --accent: #5B9BD5;
            --border: #33373D;
            --danger: #E17A6E;
            --ring-bg: #2B2F35;
            --shadow: 0 10px 30px -14px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--ink);
            line-height: 1.7;
            min-height: 100vh;
            transition: background .3s ease, color .3s ease;
            padding-bottom: 4rem;
            padding-top: env(safe-area-inset-top);
            /* لتجنب النوتش وشريط الحالة الشفاف */
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle at 1px 1px, var(--border) 1px, transparent 1px);
            background-size: 26px 26px;
            opacity: .35;
            pointer-events: none;
            z-index: 0;
        }

        .wrap {
            position: relative;
            z-index: 1;
            max-width: 760px;
            margin: 0 auto;
            padding: 1.25rem 1rem 2rem;
        }

        /* Header */
        .top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0 1.5rem;
            gap: .75rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: .6rem;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: conic-gradient(from -90deg, var(--primary), var(--accent), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }

        .brand-mark span {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.05rem;
        }

        .brand h1 {
            font-family: var(--font-display);
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: .2px;
        }

        .brand p {
            font-size: .72rem;
            color: var(--muted);
            margin-top: 1px;
        }

        .top-actions {
            display: flex;
            gap: .5rem;
            align-items: center;
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--ink);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: transform .15s ease, background .2s ease;
        }

        .icon-btn:hover {
            transform: translateY(-1px);
        }

        .icon-btn:active {
            transform: scale(.94);
        }

        /* Tabs */
        .tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 4px;
            gap: 4px;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        .tab-btn {
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: var(--font-display);
            font-weight: 700;
            font-size: .85rem;
            padding: .65rem .5rem;
            border-radius: 999px;
            cursor: pointer;
            transition: all .25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .35rem;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 6px 14px -6px var(--primary);
        }

        .view {
            display: none;
            animation: fade .35s ease;
        }

        .view.active {
            display: block;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Section headers */
        .section-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: .9rem;
            flex-wrap: wrap;
            gap: .5rem;
        }

        .section-head h2 {
            font-family: var(--font-display);
            font-size: 1.15rem;
            font-weight: 800;
        }

        .section-head .muted {
            font-size: .8rem;
            color: var(--muted);
        }

        /* Today card */
        .date-strip {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: .9rem 1rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
        }

        .date-strip .cur-date {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1rem;
        }

        .date-strip .cur-hijri {
            font-size: .75rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .date-nav {
            display: flex;
            gap: .4rem;
            align-items: center;
        }

        .date-nav button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface-2);
            cursor: pointer;
            color: var(--ink);
        }

        .date-input {
            border: 1px solid var(--border);
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            padding: .35rem .5rem;
            font-family: var(--font-body);
            color: var(--ink);
            font-size: .8rem;
        }

        /* Ring */
        .ring-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.4rem 1rem;
            display: flex;
            align-items: center;
            gap: 1.3rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        .ring-wrap {
            position: relative;
            width: 104px;
            height: 104px;
            flex-shrink: 0;
        }

        .ring-wrap svg {
            transform: rotate(-90deg);
            width: 104px;
            height: 104px;
        }

        .ring-bg-circle {
            fill: none;
            stroke: var(--ring-bg);
            stroke-width: 10;
        }

        .ring-fg-circle {
            fill: none;
            stroke: var(--primary);
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dashoffset .6s cubic-bezier(.4, 0, .2, 1);
        }

        .ring-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .ring-center .pct {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 1.4rem;
        }

        .ring-center .lbl {
            font-size: .65rem;
            color: var(--muted);
        }

        .ring-info {
            flex: 1;
        }

        .ring-info h3 {
            font-family: var(--font-display);
            font-size: 1rem;
            margin-bottom: .3rem;
        }

        .ring-info p {
            font-size: .82rem;
            color: var(--muted);
            margin-bottom: .6rem;
        }

        .streak-pill {
            display: inline-flex;
            align-items: center;
            gap: .35rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: .3rem .7rem;
            border-radius: 999px;
            font-size: .78rem;
            font-weight: 700;
        }

        /* Outer daily card wrapper */
        .daily-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.1rem;
            margin-bottom: 1.2rem;
            box-shadow: var(--shadow);
        }

        .daily-card-head {
            display: flex;
            align-items: center;
            gap: .55rem;
            margin-bottom: 1rem;
        }

        .daily-card-icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.05rem;
            flex-shrink: 0;
        }

        .daily-card-title {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 1.05rem;
        }

        /* Habit groups */
        .habit-list {
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
            margin-bottom: 0;
        }

        .habit-group {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            box-shadow: var(--shadow);
            border-top: 3px solid var(--cat-color, var(--primary));
        }

        .habit-group[data-cat="ibadat"] {
            --cat-color: #6FA8DC;
        }

        .habit-group[data-cat="sihha"] {
            --cat-color: #5FBF8F;
        }

        .habit-group[data-cat="intaj"] {
            --cat-color: #D9A544;
        }

        .habit-group-head {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin-bottom: .7rem;
            padding-bottom: .6rem;
            border-bottom: 1px dashed var(--border);
        }

        .habit-group-icon {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            background: color-mix(in srgb, var(--cat-color, var(--primary)) 18%, var(--surface));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .habit-group-title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: .95rem;
        }

        .habit-group-count {
            margin-inline-start: auto;
            font-size: .7rem;
            color: var(--muted);
            font-weight: 700;
        }

        .habit-group-body {
            display: flex;
            flex-direction: column;
            gap: .55rem;
        }

        /* Habit list */
        .habit-row {
            display: flex;
            align-items: center;
            gap: .75rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: .75rem .9rem;
            transition: border-color .2s ease, background .2s ease;
        }

        .habit-row.done {
            border-color: var(--primary);
            background: color-mix(in srgb, var(--primary) 7%, var(--surface));
        }

        .habit-check {
            width: 26px;
            height: 26px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--surface-2);
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            transition: all .2s ease;
            font-size: .85rem;
        }

        .habit-row.done .habit-check {
            background: var(--primary);
            border-color: var(--primary);
        }

        .habit-icon {
            font-size: 1.15rem;
            flex-shrink: 0;
            width: 26px;
            text-align: center;
        }

        .habit-name {
            flex: 1;
            font-weight: 600;
            font-size: .92rem;
        }

        .habit-del {
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: .95rem;
            opacity: .6;
            padding: .2rem;
        }

        .habit-del:hover {
            opacity: 1;
            color: var(--danger);
        }

        .add-habit-row {
            display: flex;
            gap: .5rem;
            margin-bottom: 1rem;
        }

        .add-habit-row input {
            flex: 1;
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: var(--radius-sm);
            padding: .65rem .8rem;
            font-family: var(--font-body);
            color: var(--ink);
            font-size: .85rem;
        }

        .btn {
            border: none;
            border-radius: var(--radius-sm);
            padding: .65rem 1.1rem;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: .85rem;
            cursor: pointer;
            transition: transform .15s ease, filter .2s ease;
            display: inline-flex;
            align-items: center;
            gap: .4rem;
        }

        .btn:active {
            transform: scale(.97);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            filter: brightness(1.08);
        }

        .btn-ghost {
            background: var(--surface);
            color: var(--ink);
            border: 1px solid var(--border);
        }

        .btn-accent {
            background: var(--accent);
            color: #fff;
        }

        .btn-block {
            width: 100%;
            justify-content: center;
        }

        .apply-box {
            background: var(--surface-2);
            border: 1px dashed var(--primary);
            border-radius: var(--radius);
            padding: 1rem;
            margin-top: 1.3rem;
        }

        .apply-box h4 {
            font-family: var(--font-display);
            font-size: .88rem;
            margin-bottom: .5rem;
        }

        .apply-box p {
            font-size: .76rem;
            color: var(--muted);
            margin-bottom: .7rem;
        }

        .apply-row {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
        }

        .apply-row input {
            flex: 1;
            min-width: 150px;
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: var(--radius-sm);
            padding: .6rem .7rem;
            font-family: var(--font-body);
            color: var(--ink);
            font-size: .85rem;
        }

        /* Calendar */
        .cal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .cal-head .month-label {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.05rem;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .cal-dow {
            text-align: center;
            font-size: .56rem;
            color: var(--muted);
            font-weight: 700;
            padding-bottom: .3rem;
            letter-spacing: -0.2px;
            line-height: 1.2;
        }

        .cal-cell {
            aspect-ratio: 1/1;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform .15s ease;
        }

        .cal-cell:hover {
            transform: translateY(-2px);
        }

        .cal-cell.empty {
            visibility: hidden;
            pointer-events: none;
        }

        .cal-cell .num {
            font-size: .8rem;
            font-weight: 700;
            z-index: 2;
        }

        .cal-cell .fill {
            position: absolute;
            inset: 3px;
            border-radius: 9px;
            background: var(--primary);
            opacity: 0;
            transition: opacity .2s ease;
        }

        .cal-cell.today {
            border-color: var(--accent);
            border-width: 2px;
        }

        .cal-cell.has-data .fill {
            opacity: var(--fill-opacity, 0);
        }

        .cal-cell.has-data .num,
        .cal-cell.has-data.bright .num {
            color: #fff;
        }

        .cal-legend {
            display: flex;
            align-items: center;
            gap: .6rem;
            margin-top: 1rem;
            font-size: .72rem;
            color: var(--muted);
            flex-wrap: wrap;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            display: inline-block;
            background: var(--primary);
        }

        /* Log */
        .log-month-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .log-day {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: .9rem 1rem;
            margin-bottom: .7rem;
            box-shadow: var(--shadow);
        }

        .log-day-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: .5rem;
            cursor: pointer;
        }

        .log-day-title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: .9rem;
        }

        .log-day-sub {
            font-size: .72rem;
            color: var(--muted);
        }

        .log-day-pct {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: .85rem;
            padding: .2rem .6rem;
            border-radius: 999px;
            background: var(--surface-2);
            border: 1px solid var(--border);
        }

        .log-habits {
            display: none;
            flex-wrap: wrap;
            gap: .4rem;
            margin-top: .6rem;
            padding-top: .6rem;
            border-top: 1px dashed var(--border);
        }

        .add-habit-options {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px dashed var(--border);
            display: none;
            animation: fadeSlideUp 0.3s ease;
        }

        .add-habit-options.show {
            display: block !important;
        }

        .advanced-toggle-btn {
            background: transparent;
            border: none;
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            padding: 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-top: 0.5rem;
        }

        .log-day.open .log-habits {
            display: flex;
        }

        .log-habit-tag {
            font-size: .72rem;
            padding: .25rem .6rem;
            border-radius: 999px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: .3rem;
        }

        .log-habit-tag.miss {
            opacity: .45;
            text-decoration: line-through;
        }

        .empty-state {
            text-align: center;
            padding: 2.5rem 1rem;
            color: var(--muted);
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
        }

        .empty-state .em-icon {
            font-size: 2rem;
            margin-bottom: .6rem;
        }

        .emoji-modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;

    <script>
                (function () {
                    const STORAGE_HABITS = 'rtn-habits-v1';
                    const STORAGE_RECORDS = 'rtn-records-v1';

                    const categories = [
                        { id: 'ibadat', name: 'عبادات', icon: '🕌' },
                        { id: 'sihha', name: 'صحّة', icon: '🌿' },
                        { id: 'intaj', name: 'إنتاجيّة', icon: '💡' },
                    ];

                    const defaultHabits = [
                        { id: 'h1', icon: '🌅', name: 'صلاة الفجر', cat: 'ibadat' },
                        { id: 'h2', icon: '🕌', name: 'صلاة الظهرين', cat: 'ibadat' },
                        { id: 'h3', icon: '🌇', name: 'صلاة العشائين', cat: 'ibadat' },
                        { id: 'h4', icon: '📿', name: 'استغفار', cat: 'ibadat' },
                        { id: 'h5', icon: '📿', name: 'تسبيح', cat: 'ibadat' },
                        { id: 'h6', icon: '🚶', name: 'مشي 15 دقيقة', cat: 'sihha' },
                        { id: 'h7', icon: '💧', name: 'شرب 8 أكواب من الماء', cat: 'sihha' },
                        { id: 'h8', icon: '🧴', name: 'مرطّب للبشرة', cat: 'sihha' },
                        { id: 'h9', icon: '✍️', name: 'كتابة فكرة / مقال / تعلّم شيء جديد', cat: 'intaj' },
                    ];
                    const defaultHabitIds = new Set(defaultHabits.map(h => h.id));

                    // Returns habits visible on a given date key:
                    // all default habits + custom habits based on their addedDate and type
                    function habitsForDate(dateKey) {
                        const [y, m, d] = dateKey.split('-');
                        const dateObj = new Date(y, m - 1, d);
                        const dayOfWeek = dateObj.getDay();

                        return habits.filter(h => {
                            if (defaultHabitIds.has(h.id)) return true;

                            // If the habit was added after this date, hide it
                            if (h.addedDate && dateKey < h.addedDate) return false;

                            // If it has no type, treat it as continuous for backward compatibility
                            if (!h.type || h.type === 'continuous') {
                                return true;
                            }

                            if (h.type === 'specific_days' && h.days) {
                                return h.days.includes(dayOfWeek);
                            }

                            if (h.type === 'once') {
                                return dateKey === h.addedDate;
                            }

                            return false;
                        });
                    }

                    function loadHabits() {
                        try {
                            const raw = localStorage.getItem(STORAGE_HABITS);
                            if (raw) {
                                let list = JSON.parse(raw);
                                const newDefaultsMap = {};
                                defaultHabits.forEach(dh => newDefaultsMap[dh.id] = dh);

                                list = list.map(h => {
                                    if (newDefaultsMap[h.id]) {
                                        return newDefaultsMap[h.id];
                                    }
                                    return { ...h, cat: h.cat || 'intaj' };
                                });

                                if (!list.find(h => h.id === 'h9')) {
                                    list.push(newDefaultsMap['h9']);
                                }

                                saveHabits(list);
                                return list;
                            }
                        } catch (e) { }
                        saveHabits(defaultHabits);
                        return defaultHabits.slice();
                    }
                    function saveHabits(list) { localStorage.setItem(STORAGE_HABITS, JSON.stringify(list)); }
                    function loadRecords() {
                        try {
                            const raw = localStorage.getItem(STORAGE_RECORDS);
                            if (raw) return JSON.parse(raw);
                        } catch (e) { }
                        return {};
                    }
                    function saveRecords(rec) { localStorage.setItem(STORAGE_RECORDS, JSON.stringify(rec)); }

                    let habits = loadHabits();
                    let records = loadRecords(); // { 'YYYY-MM-DD': { habitId: true } }

                    const fmt = d => {
                        const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
                        return `${y}-${m}-${day}`;
                    };
                    const todayStr = fmt(new Date());
                    let activeDate = new Date();
                    let calMonth = new Date();
                    let logMonth = new Date();

                    const dowNames = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
                    const monthNames = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];

                    // ---------- Custom confirm (native confirm() is blocked in sandboxed iframes) ----------
                    const confirmOverlay = document.getElementById('confirm-overlay');
                    const confirmText = document.getElementById('confirm-text');
                    const confirmOkBtn = document.getElementById('confirm-ok');
                    const confirmCancelBtn = document.getElementById('confirm-cancel');
                    let pendingConfirmAction = null;
                    function askConfirm(message, onConfirm) {
                        confirmText.textContent = message;
                        pendingConfirmAction = onConfirm;
                        confirmOverlay.classList.add('show');
                    }
                    confirmOkBtn.addEventListener('click', () => {
                        confirmOverlay.classList.remove('show');
                        if (pendingConfirmAction) pendingConfirmAction();
                        pendingConfirmAction = null;
                    });
                    confirmCancelBtn.addEventListener('click', () => {
                        confirmOverlay.classList.remove('show');
                        pendingConfirmAction = null;
                    });
                    confirmOverlay.addEventListener('click', (e) => {
                        if (e.target === confirmOverlay) { confirmOverlay.classList.remove('show'); pendingConfirmAction = null; }
                    });

                    // ---------- Toast ----------
                    let toastTimer;
                    function showToast(msg) {
                        const t = document.getElementById('toast');
                        t.textContent = msg;
                        t.classList.add('show');
                        clearTimeout(toastTimer);
                        toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
                    }

                    // ---------- Tabs ----------
                    document.querySelectorAll('.tab-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                            btn.classList.add('active');
                            document.getElementById('view-' + btn.dataset.view).classList.add('active');
                            if (btn.dataset.view === 'calendar') renderCalendar();
                            if (btn.dataset.view === 'log') renderLog();
                        });
                    });

                    function goToView(name) {
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.view === name));
                        document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + name));
                    }

                    // ---------- Theme ----------
                    const themeBtn = document.getElementById('theme-btn');
                    function applyTheme(t) {
                        document.documentElement.setAttribute('data-theme', t);
                        localStorage.setItem('rtn-theme', t);
                        themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
                    }
                    applyTheme(localStorage.getItem('rtn-theme') || 'light');
                    themeBtn.addEventListener('click', () => {
                        applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
                    });
                    document.getElementById('print-btn').addEventListener('click', () => window.print());

                    // ---------- POP SOUNDS (Web Audio API) ----------
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    function playPopSound(isChecked) {
                        if (audioCtx.state === 'suspended') audioCtx.resume();
                        const t = audioCtx.currentTime;
                        if (isChecked) {
                            const pop = audioCtx.createOscillator();
                            const popGain = audioCtx.createGain();
                            pop.type = 'sine';
                            pop.frequency.setValueAtTime(1800, t);
                            pop.frequency.exponentialRampToValueAtTime(400, t + 0.03);
                            popGain.gain.setValueAtTime(0.15, t);
                            popGain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
                            pop.connect(popGain);
                            popGain.connect(audioCtx.destination);
                            pop.start(t);
                            pop.stop(t + 0.06);

                            [
                                { f: 659.25, v: 0.10 },
                                { f: 987.77, v: 0.05 },
                            ].forEach(n => {
                                const o = audioCtx.createOscillator();
                                const g = audioCtx.createGain();
                                o.type = 'sine';
                                o.frequency.setValueAtTime(n.f, t);
                                g.gain.setValueAtTime(0, t + 0.02);
                                g.gain.linearRampToValueAtTime(n.v, t + 0.05);
                                g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                                o.connect(g);
                                g.connect(audioCtx.destination);
                                o.start(t + 0.02);
                                o.stop(t + 0.4);
                            });
                        } else {
                            const osc = audioCtx.createOscillator();
                            const gain = audioCtx.createGain();
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(440, t);
                            osc.frequency.exponentialRampToValueAtTime(300, t + 0.15);
                            gain.gain.setValueAtTime(0.07, t);
                            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                            osc.connect(gain);
                            gain.connect(audioCtx.destination);
                            osc.start(t);
                            osc.stop(t + 0.15);
                        }
                    }

                    // ---------- TODAY VIEW ----------
                    const habitListEl = document.getElementById('habit-list');
                    const activeDateInput = document.getElementById('active-date-input');

                    function dayLabel(d) {
                        return `${dowNames[d.getDay()]}، ${d.getDate()} ${monthNames[d.getMonth()]} ${d.getFullYear()}`;
                    }

                    function renderHabitList() {
                        const key = fmt(activeDate);
                        const dayRec = records[key] || {};
                        const visibleHabits = habitsForDate(key);
                        habitListEl.innerHTML = '';
                        if (visibleHabits.length === 0) {
                            habitListEl.innerHTML = `<div class="empty-state"><div class="em-icon">✨</div>لا توجد عادات بعد — أضف أول عادة لك بالأسفل</div>`;
                        }
                        categories.forEach(cat => {
                            const catHabits = visibleHabits.filter(h => h.cat === cat.id);
                            if (catHabits.length === 0) return;
                            const group = document.createElement('div');
                            group.className = 'habit-group';
                            group.dataset.cat = cat.id;
                            const doneCount = catHabits.filter(h => dayRec[h.id]).length;
                            group.innerHTML = `
        <div class="habit-group-head">
          <span class="habit-group-icon">${cat.icon}</span>
          <span class="habit-group-title">${cat.name}</span>
          <span class="habit-group-count">${doneCount}/${catHabits.length}</span>
        </div>
        <div class="habit-group-body"></div>
      `;
                            const body = group.querySelector('.habit-group-body');
                            catHabits.forEach(h => {
                                const done = !!dayRec[h.id];
                                const isDefault = defaultHabitIds.has(h.id);
                                const row = document.createElement('div');
                                row.className = 'habit-row' + (done ? ' done' : '');
                                row.innerHTML = `
          <button class="habit-check" data-id="${h.id}">${done ? '✓' : ''}</button>
          <span class="habit-icon">${h.icon}</span>
          <span class="habit-name">${h.name}</span>
          ${isDefault ? '' : `<button class="habit-del" data-id="${h.id}" title="حذف العادة">🗑️</button>`}
        `;
                                body.appendChild(row);
                            });
                            habitListEl.appendChild(group);
                        });
                        document.getElementById('habit-count-lbl').textContent = `${visibleHabits.length} عادة`;
                        updateRing();
                    }

                    // ---------- Category Picker Logic ----------
                    const catPickerBtn = document.getElementById('cat-picker-btn');
                    const catIconVal = document.getElementById('new-habit-cat-val');
                    const catModalOverlay = document.getElementById('cat-modal-overlay');
                    const catModalClose = document.getElementById('cat-modal-close');
                    const catGrid = document.getElementById('cat-grid');

                    if (catGrid) {
                        categories.forEach(c => {
                            const btn = document.createElement('button');
                            btn.className = 'emoji-btn';
                            btn.style.fontSize = '1.1rem';
                            btn.style.padding = '10px';
                            btn.style.fontFamily = "'Tajawal', sans-serif";
                            btn.innerHTML = `${c.icon} ${c.name}`;
                            btn.addEventListener('click', () => {
                                if (catIconVal) catIconVal.value = c.id;
                                if (catPickerBtn) catPickerBtn.textContent = `${c.icon} ${c.name}`;
                                catModalOverlay.classList.remove('show');
                            });
                            catGrid.appendChild(btn);
                        });
                    }

                    if (catPickerBtn) {
                        catPickerBtn.addEventListener('click', () => catModalOverlay.classList.add('show'));
                    }
                    if (catModalClose) {
                        catModalClose.addEventListener('click', () => catModalOverlay.classList.remove('show'));
                    }

                    habitListEl.addEventListener('click', (e) => {
                        const checkBtn = e.target.closest('.habit-check');
                        const delBtn = e.target.closest('.habit-del');
                        const key = fmt(activeDate);
                        if (checkBtn) {
                            const id = checkBtn.dataset.id;
                            records[key] = records[key] || {};
                            const wasChecked = !!records[key][id];
                            records[key][id] = !wasChecked;
                            if (!records[key][id]) delete records[key][id];
                            saveRecords(records);

                            const row = checkBtn.closest('.habit-row');
                            const nowChecked = !wasChecked;
                            if (nowChecked) {
                                row.classList.add('done');
                                checkBtn.textContent = '✓';
                            } else {
                                row.classList.remove('done');
                                checkBtn.textContent = '';
                            }

                            const group = row.closest('.habit-group');
                            if (group) {
                                const catId = group.dataset.cat;
                                const catHabits = habits.filter(h => h.cat === catId);
                                const dayRec = records[key] || {};
                                const doneCount = catHabits.filter(h => dayRec[h.id]).length;
                                const countEl = group.querySelector('.habit-group-count');
                                if (countEl) countEl.textContent = `${doneCount}/${catHabits.length}`;
                            }

                            checkBtn.style.transform = 'scale(1.3)';
                            setTimeout(() => checkBtn.style.transform = '', 200);

                            playPopSound(nowChecked);

                            updateRing();
                        } else if (delBtn) {
                            const id = delBtn.dataset.id;
                            if (defaultHabitIds.has(id)) return;
                            const h = habits.find(x => x.id === id);
                            askConfirm(`حذف عادة "${h ? h.name : ''}"؟`, () => {
                                habits = habits.filter(x => x.id !== id);
                                saveHabits(habits);
                                if (h && h.addedDate && records[h.addedDate]) {
                                    delete records[h.addedDate][id];
                                    saveRecords(records);
                                }
                                renderHabitList();
                                showToast('تم حذف العادة');
                            });
                        }
                    });

                    // ---------- Add Habit UI Events ----------
                    const newHabitInput = document.getElementById('new-habit-input');
                    const addHabitOptions = document.getElementById('add-habit-options');
                    const advancedToggleBtn = document.getElementById('advanced-toggle-btn');
                    const daysSelector = document.getElementById('days-selector');
                    const habitTypeRadios = document.querySelectorAll('input[name="habit_type"]');

                    advancedToggleBtn.addEventListener('click', () => {
                        addHabitOptions.classList.toggle('show');
                    });
                    newHabitInput.addEventListener('focus', () => {
                        addHabitOptions.classList.add('show');
                    });
                    newHabitInput.addEventListener('input', () => {
                        addHabitOptions.classList.add('show');
                    });

                    habitTypeRadios.forEach(r => {
                        r.addEventListener('change', (e) => {
                            if (e.target.value === 'specific_days') {
                                daysSelector.style.display = 'flex';
                            } else {
                                daysSelector.style.display = 'none';
                            }
                        });
                    });

                    // ---------- Emoji Picker Logic ----------
                    const emojis = ['⭐', '💧', '📖', '🏃', '🧘', '🍎', '📝', '💻', '💡', '📿', '🕌', '🏋️', '🎯', '🎨', '💊', '💰', '🧹', '🪴', '🥦', '🎮'];
                    const emojiPickerBtn = document.getElementById('emoji-picker-btn');
                    const emojiIconVal = document.getElementById('new-habit-icon-val');
                    const emojiModalOverlay = document.getElementById('emoji-modal-overlay');
                    const emojiModalClose = document.getElementById('emoji-modal-close');
                    const emojiGrid = document.getElementById('emoji-grid');

                    if (emojiGrid) {
                        emojis.forEach(em => {
                            const btn = document.createElement('button');
                            btn.className = 'emoji-btn';
                            btn.textContent = em;
                            btn.addEventListener('click', () => {
                                if (emojiIconVal) emojiIconVal.value = em;
                                if (emojiPickerBtn) emojiPickerBtn.textContent = em;
                                emojiModalOverlay.classList.remove('show');
                            });
                            emojiGrid.appendChild(btn);
                        });
                    }

                    if (emojiPickerBtn) {
                        emojiPickerBtn.addEventListener('click', () => emojiModalOverlay.classList.add('show'));
                    }
                    if (emojiModalClose) {
                        emojiModalClose.addEventListener('click', () => emojiModalOverlay.classList.remove('show'));
                    }

                    document.getElementById('add-habit-btn').addEventListener('click', addHabit);
                    newHabitInput.addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });

                    function addHabit() {
                        try {
                            const input = newHabitInput;
                            const val = input.value.trim();
                            if (!val) return;

                            const catVal = document.getElementById('new-habit-cat-val');
                            const cat = catVal ? catVal.value : 'intaj';
                            const dateKey = fmt(activeDate);

                            const typeRadio = document.querySelector('input[name="habit_type"]:checked');
                            const type = typeRadio ? typeRadio.value : 'continuous';
                            let days = null;

                            if (type === 'specific_days') {
                                const checkboxes = document.querySelectorAll('#days-selector input[type="checkbox"]:checked');
                                days = Array.from(checkboxes).map(cb => parseInt(cb.value));
                                if (days.length === 0) {
                                    showToast('الرجاء اختيار يوم واحد على الأقل');
                                    return;
                                }
                            }

                            const iconVal = document.getElementById('new-habit-icon-val');
                            const icon = iconVal ? iconVal.value : '⭐';

                            habits.push({ id: 'h' + Date.now(), icon: icon, name: val, cat, addedDate: dateKey, type, days });
                            saveHabits(habits);
                            input.value = '';
                            addHabitOptions.classList.remove('show');

                            // Reset UI
                            const continuousRadio = document.querySelector('input[name="habit_type"][value="continuous"]');
                            if (continuousRadio) continuousRadio.checked = true;
                            daysSelector.style.display = 'none';
                            document.querySelectorAll('#days-selector input[type="checkbox"]').forEach(cb => cb.checked = false);

                            // Re-render immediately
                            renderHabitList();
                            showToast('تمت إضافة العادة بنجاح');
                        } catch (err) {
                            alert('Error adding habit: ' + err.message);
                        }
                    }

                    function updateRing() {
                        const key = fmt(activeDate);
                        const dayRec = records[key] || {};
                        const visibleHabits = habitsForDate(key);
                        const total = visibleHabits.length;
                        const done = visibleHabits.filter(h => dayRec[h.id]).length;
                        const pct = total ? Math.round((done / total) * 100) : 0;
                        const circle = document.getElementById('ring-fg');
                        const circumference = 283;
                        circle.style.strokeDashoffset = circumference - (circumference * pct / 100);
                        document.getElementById('ring-pct').textContent = pct + '%';
                        const title = document.getElementById('ring-title');
                        const sub = document.getElementById('ring-sub');
                        if (total === 0) { title.textContent = 'أضف عاداتك أولاً'; sub.textContent = 'ابدأ بإضافة عادة من القائمة أدناه.'; }
                        else if (pct === 100) { title.textContent = 'أحسنت! يوم مكتمل 🎉'; sub.textContent = 'أنجزت كل عاداتك لهذا اليوم.'; }
                        else if (pct === 0) { title.textContent = 'لم تبدأ بعد'; sub.textContent = 'أنجز عاداتك لهذا اليوم واحدة تلو الأخرى.'; }
                        else { title.textContent = `${done} من ${total} مكتملة`; sub.textContent = 'استمر، أنت قريب من إتمام يومك.'; }
                        document.getElementById('streak-count').textContent = computeStreak();
                    }

                    function computeStreak() {
                        if (habits.length === 0) return 0;
                        let streak = 0;
                        let d = new Date();
                        // count consecutive days (including today only if it already has full completion, else start from yesterday)
                        for (let i = 0; i < 400; i++) {
                            const key = fmt(d);
                            const dayHabits = habitsForDate(key);
                            const rec = records[key] || {};
                            const done = dayHabits.filter(h => rec[h.id]).length;
                            const complete = dayHabits.length > 0 && done === dayHabits.length;
                            if (i === 0 && !complete) { d.setDate(d.getDate() - 1); continue; }
                            if (complete) { streak++; d.setDate(d.getDate() - 1); } else break;
                        }
                        return streak;
                    }

                    function setActiveDate(d) {
                        activeDate = d;
                        activeDateInput.value = fmt(d);
                        document.getElementById('cur-date-label').textContent = `${d.getDate()} ${monthNames[d.getMonth()]} ${d.getFullYear()}`;
                        document.getElementById('cur-day-name').textContent = dowNames[d.getDay()] + (fmt(d) === todayStr ? ' • اليوم' : '');
                        renderHabitList();
                    }

                    document.getElementById('day-prev').addEventListener('click', () => { const d = new Date(activeDate); d.setDate(d.getDate() - 1); setActiveDate(d); });
                    document.getElementById('day-next').addEventListener('click', () => { const d = new Date(activeDate); d.setDate(d.getDate() + 1); setActiveDate(d); });
                    activeDateInput.addEventListener('change', () => {
                        if (activeDateInput.value) { const [y, m, day] = activeDateInput.value.split('-').map(Number); setActiveDate(new Date(y, m - 1, day)); }
                    });

                    // ---------- CALENDAR VIEW ----------
                    const calGrid = document.getElementById('cal-grid');
                    const calDowRow = document.getElementById('cal-dow-row');
                    dowNames.forEach(n => {
                        const el = document.createElement('div');
                        el.className = 'cal-dow';
                        el.textContent = n;
                        calDowRow.appendChild(el);
                    });

                    function renderCalendar() {
                        const y = calMonth.getFullYear(), m = calMonth.getMonth();
                        document.getElementById('cal-month-label').textContent = `${monthNames[m]} ${y}`;
                        calGrid.innerHTML = '';
                        const firstDay = new Date(y, m, 1).getDay();
                        const daysInMonth = new Date(y, m + 1, 0).getDate();
                        for (let i = 0; i < firstDay; i++) {
                            const empty = document.createElement('div');
                            empty.className = 'cal-cell empty';
                            calGrid.appendChild(empty);
                        }
                        for (let d = 1; d <= daysInMonth; d++) {
                            const dateObj = new Date(y, m, d);
                            const key = fmt(dateObj);
                            const rec = records[key] || {};
                            const dayHabits = habitsForDate(key);
                            const total = dayHabits.length;
                            const done = dayHabits.filter(h => rec[h.id]).length;
                            const pct = total ? done / total : 0;
                            const cell = document.createElement('div');
                            cell.className = 'cal-cell' + (pct > 0 ? ' has-data' : '') + (key === todayStr ? ' today' : '') + (pct > 0.5 ? ' bright' : '');
                            cell.style.setProperty('--fill-opacity', pct > 0 ? Math.max(pct, 0.18) : 0);
                            cell.innerHTML = `<div class="fill"></div><span class="num">${d}</span>`;
                            cell.addEventListener('click', () => { setActiveDate(dateObj); goToView('today'); });
                            calGrid.appendChild(cell);
                        }
                    }
                    document.getElementById('cal-prev').addEventListener('click', () => { calMonth.setMonth(calMonth.getMonth() - 1); renderCalendar(); });
                    document.getElementById('cal-next').addEventListener('click', () => { calMonth.setMonth(calMonth.getMonth() + 1); renderCalendar(); });

                    // ---------- LOG VIEW ----------
                    function renderLog() {
                        const y = logMonth.getFullYear(), m = logMonth.getMonth();
                        document.getElementById('log-month-label').textContent = `${monthNames[m]} ${y}`;
                        const list = document.getElementById('log-list');
                        list.innerHTML = '';
                        const daysInMonth = new Date(y, m + 1, 0).getDate();
                        let any = false;
                        for (let d = daysInMonth; d >= 1; d--) {
                            const dateObj = new Date(y, m, d);
                            const key = fmt(dateObj);
                            const rec = records[key];
                            if (!rec || Object.keys(rec).length === 0) continue;
                            any = true;
                            const dayHabits = habitsForDate(key);
                            const total = dayHabits.length;
                            const done = dayHabits.filter(h => rec[h.id]).length;
                            const pct = total ? Math.round((done / total) * 100) : 0;
                            const card = document.createElement('div');
                            card.className = 'log-day';
                            const tags = dayHabits.map(h => {
                                const ok = !!rec[h.id];
                                return `<span class="log-habit-tag ${ok ? '' : 'miss'}">${h.icon} ${h.name}</span>`;
                            }).join('');
                            card.innerHTML = `
        <div class="log-day-head">
          <div>
            <div class="log-day-title">${dowNames[dateObj.getDay()]}، ${d} ${monthNames[m]}</div>
            <div class="log-day-sub">${done} من ${total} عادة منجزة</div>
          </div>
          <span class="log-day-pct">${pct}%</span>
        </div>
        <div class="log-habits">${tags}</div>
      `;
                            card.querySelector('.log-day-head').addEventListener('click', () => card.classList.toggle('open'));
                            list.appendChild(card);
                        }
                        if (!any) {
                            list.innerHTML = `<div class="empty-state"><div class="em-icon">📭</div>لا يوجد سجل إنجاز في هذا الشهر</div>`;
                        }
                    }
                    document.getElementById('log-prev').addEventListener('click', () => { logMonth.setMonth(logMonth.getMonth() - 1); renderLog(); });
                    document.getElementById('log-next').addEventListener('click', () => { logMonth.setMonth(logMonth.getMonth() + 1); renderLog(); });

                    // ---------- INIT ----------
                    setActiveDate(new Date());
                    renderCalendar();

                    // ---------- SPLASH & ENTRANCE ANIMATIONS ----------
                    setTimeout(() => {
                        const splash = document.getElementById('splash');
                        splash.classList.add('hide');
                        document.querySelector('.wrap').classList.add('anim-ready');
                        splash.addEventListener('transitionend', () => splash.remove());
                    }, 1200);
                })();
    </script>
</body>

</html>
